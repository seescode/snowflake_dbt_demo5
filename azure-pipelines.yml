trigger: none  # optional (since this is PR-based)

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  DBT_PROFILES_DIR: $(HOME)/.dbt
  PR_SCHEMA: dbt_pr_$(System.PullRequest.PullRequestNumber)

steps:

- checkout: self

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.11'

- script: |
    python -m pip install --upgrade pip
    pip install dbt-snowflake
  displayName: Install dependencies

- script: |
    mkdir -p "$DBT_PROFILES_DIR"
    cat <<EOF > "$DBT_PROFILES_DIR/profiles.yml"
    dbtdemo5:
      target: ci
      outputs:
        ci:
          type: snowflake
          account: $(SNOWFLAKE_ACCOUNT)
          user: $(SNOWFLAKE_USER)
          password: $(SNOWFLAKE_PASSWORD)
          role: $(SNOWFLAKE_ROLE)
          database: $(SNOWFLAKE_DATABASE)
          warehouse: $(SNOWFLAKE_WAREHOUSE)
          schema: $(PR_SCHEMA)
          threads: 4
    EOF
  displayName: Create profiles.yml

- script: dbt deps
  displayName: Install dbt dependencies

- script: dbt debug
  displayName: Debug connection

- script: dbt build
  displayName: Run dbt build
